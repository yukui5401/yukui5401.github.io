<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writing — Brooke Yang</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- KaTeX for math rendering -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    ></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        renderMathInElement(document.body, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false },
          ],
        });
      });
    </script>
  </head>
  <body>
    <header>
      <nav>
        <div class="nav-links">
          <a href="index.html">About</a>
          <a href="writing.html" class="active">Writing</a>
        </div>
      </nav>
    </header>

    <main class="writing-page">
      <div class="page-header">
        <h1>Writing</h1>
        <p>
          Short posts on math I find interesting $-$ proofs, ideas, and things
          worth thinking about.
        </p>
      </div>

      <section class="post-group">
        <h3 class="year-label">2026</h3>
        <ul class="post-list full">
          <li>
            <a href="posts/sample-post.html" class="post-link">
              <div>
                <span class="post-title"
                  >A Geometric Perspective into Farkas' Lemma</span
                >
                <span class="post-excerpt"
                  >What the infeasibility of a system $Ax\le b$ really tells
                  us.</span
                >
              </div>
              <span class="post-meta">April 2026 &middot; Analysis</span>
            </a>
          </li>
          <!-- Copy a <li> block above each time you write a new post -->
        </ul>
      </section>
    </main>

    <footer>
      <p>Last updated: April 2026</p>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
